<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  
  <!-- SEO Meta Tags -->
  <title>GrooAgri | Professional Agriculture Equipment & Farm Solutions</title>
  <meta name="description" content="GrooAgri is India's leading platform for professional agriculture equipment booking. Rent tractors, harvesters, and more from verified vendors." />
  <meta name="keywords" content="agriculture equipment, tractor rental, harvester booking, GrooAgri, farm machinery India, smart farming" />
  <meta name="author" content="GrooAgri" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://grooagri.com/" />
  <meta property="og:title" content="GrooAgri | Modern Farming Solutions" />
  <meta property="og:description" content="Book professional agriculture machinery with ease. Empowering farmers with technology and reliable equipment." />
  <meta property="og:image" content="https://grooagri.com/logo.png" />

  <!-- Structured Data (JSON-LD) for Sitelinks & Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GrooAgri",
      "url": "https://grooagri.com",
      "logo": "https://grooagri.com/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-0000000000",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.facebook.com/grooagri",
        "https://www.instagram.com/grooagri"
      ]
    }
  </script>

  <!-- Content Security Policy - iOS Safari Compatible -->
  <!-- Note: iOS Safari has stricter CSP parsing. worker-src blob: is needed for some iOS JS. -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: http: https:; font-src 'self' data: https:; connect-src 'self' https: wss: ws: http://localhost:* http://127.0.0.1:* blob:; frame-src 'self' https:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body
  style="background-color: #ffffff; background: linear-gradient(to bottom, rgba(0, 166, 166, 0.03) 0%, rgba(41, 173, 129, 0.02) 10%, #ffffff 20%); margin: 0; padding: 0;">
  <div id="root"
    style="background-color: #ffffff; background: linear-gradient(to bottom, rgba(0, 166, 166, 0.03) 0%, rgba(41, 173, 129, 0.02) 10%, #ffffff 20%); min-height: 100dvh;">
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
